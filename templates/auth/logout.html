<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abgemeldet – Faszienbehandlung Thilo Seifried</title>
  <link rel="icon" href="/favicon.v1.ico">
  <link rel="preload" href="/fonts/cormorant-garamond-normal-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/auth.css">
  <style>
    .logout-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      animation: wave 1.5s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(15deg); }
    }
  </style>
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="logout-icon">👋</div>
      <h1>Erfolgreich abgemeldet</h1>
      <p class="auth-subtitle">Du hast dich sicher aus deinem Konto abgemeldet. Bis zum nächsten Mal!</p>
      
      <a href="/login" class="auth-btn" style="text-decoration: none;">
        <span>Zurück zur Anmeldung</span>
      </a>

      <a href="/" class="auth-back">← Zur Startseite</a>
    </div>
  </div>
</body>
</html>
