<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort zurücksetzen – Faszienbehandlung</title>
  <link rel="icon" href="/favicon.v1.ico">
  <link rel="preload" href="/fonts/cormorant-garamond-normal-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="/Logo.png" alt="Faszienbehandlung" width="120" height="49">
      </a>
      <h1>Passwort zurücksetzen</h1>
      <p class="auth-subtitle">Gib deine E-Mail-Adresse ein und wir senden dir einen Link</p>

      <div id="error-msg" class="auth-error" style="display:none"></div>
      <div id="success-msg" class="auth-success" style="display:none"></div>

      <form id="reset-form" class="auth-form">
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input type="email" id="email" name="email" required placeholder="deine@email.de">
        </div>
        <button type="submit" class="auth-btn" id="submit-btn">
          <span class="btn-text">Link senden</span>
          <span class="btn-loader" style="display:none"></span>
        </button>
      </form>

      <div class="auth-links">
        <a href="/login">← Zurück zur Anmeldung</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      btn.querySelector('.btn-text').style.display = 'none';
      btn.querySelector('.btn-loader').style.display = 'inline-block';
      btn.disabled = true;
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        const data = await res.json();
        successMsg.textContent = data.message || 'Link wurde gesendet, falls ein Konto existiert.';
        successMsg.style.display = 'block';
      } catch (err) {
        errorMsg.textContent = 'Verbindungsfehler. Bitte versuche es erneut.';
        errorMsg.style.display = 'block';
      } finally {
        btn.querySelector('.btn-text').style.display = 'inline';
        btn.querySelector('.btn-loader').style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
