<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neues Passwort setzen – Faszienbehandlung</title>
  <link rel="icon" href="/favicon.v1.ico">
  <link rel="preload" href="/fonts/cormorant-garamond-normal-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="/Logo-256.v2.png" alt="Faszienbehandlung" width="120" height="49">
      </a>
      <h1>Neues Passwort setzen</h1>

      <div id="error-msg" class="auth-error" style="display:none"></div>
      <div id="success-msg" class="auth-success" style="display:none"></div>

      <form id="reset-confirm-form" class="auth-form">
        <div class="form-group">
          <label for="new_password">Neues Passwort <small>(min. 6 Zeichen)</small></label>
          <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="auth-btn" id="submit-btn">
          <span class="btn-text">Passwort ändern</span>
          <span class="btn-loader" style="display:none"></span>
        </button>
      </form>

      <div class="auth-links">
        <a href="/login">← Zur Anmeldung</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('reset-confirm-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      btn.querySelector('.btn-text').style.display = 'none';
      btn.querySelector('.btn-loader').style.display = 'inline-block';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/reset-password/{{ token }}', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ new_password: document.getElementById('new_password').value }),
        });
        const data = await res.json();
        if (data.success) {
          successMsg.textContent = data.message;
          successMsg.style.display = 'block';
          document.getElementById('reset-confirm-form').style.display = 'none';
          setTimeout(() => window.location.href = '/login', 2500);
        } else {
          errorMsg.textContent = data.error;
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Verbindungsfehler.';
        errorMsg.style.display = 'block';
      } finally {
        btn.querySelector('.btn-text').style.display = 'inline';
        btn.querySelector('.btn-loader').style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
