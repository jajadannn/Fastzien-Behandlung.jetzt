<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Mail bestätigen – Faszienbehandlung Thilo Seifried</title>
  <link rel="icon" href="/favicon.v1.ico">
  <link rel="preload" href="/fonts/cormorant-garamond-normal-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-latin.v1.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <img src="/Logo.png" alt="Faszienbehandlung" width="120" height="49">
      </a>

      {% if success %}
      <div style="text-align:center; margin-bottom: 12px;">
        <span style="font-size: 48px;">✅</span>
      </div>
      <h1 style="text-align:center; color: var(--sky-dark);">E-Mail bestätigt!</h1>
      <p class="auth-subtitle">{{ message }}</p>
      <a href="/portal" class="auth-btn" style="display:block; text-align:center; text-decoration:none; margin-top: 24px;">
        Zum Kundenportal
      </a>
      {% else %}
      <div style="text-align:center; margin-bottom: 12px;">
        <span style="font-size: 48px;">⚠️</span>
      </div>
      <h1 style="text-align:center; color: var(--plum);">Link ungültig</h1>
      <p class="auth-subtitle">{{ message }}</p>
      <a href="/portal" class="auth-btn" style="display:block; text-align:center; text-decoration:none; margin-top: 24px;">
        Zum Kundenportal
      </a>
      {% endif %}

      <a href="/" class="auth-back" style="margin-top: 20px; display:block; text-align:center;">← Zurück zur Startseite</a>
    </div>
  </div>
</body>
</html>
